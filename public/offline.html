<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Travel Engineers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #060e1a;
      color: white;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background orbs */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: float 8s ease-in-out infinite;
    }
    .orb-1 { width: 400px; height: 400px; background: #d4850a; top: -100px; right: -80px; animation-delay: 0s; }
    .orb-2 { width: 300px; height: 300px; background: #1a4a8a; bottom: -80px; left: -60px; animation-delay: -3s; }
    .orb-3 { width: 200px; height: 200px; background: #f0c060; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -6s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.05); }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 24px;
      max-width: 480px;
      width: 100%;
    }

    .icon-wrap {
      width: 88px;
      height: 88px;
      background: rgba(212,133,10,0.12);
      border: 1px solid rgba(240,192,96,0.2);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      font-size: 40px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(212,133,10,0.3); }
      50% { box-shadow: 0 0 0 16px rgba(212,133,10,0); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 6vw, 42px);
      color: white;
      margin-bottom: 12px;
      line-height: 1.1;
    }

    .brand {
      font-size: 13px;
      font-weight: 700;
      color: #f0c060;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    p {
      font-size: 15px;
      color: rgba(255,255,255,0.5);
      line-height: 1.7;
      margin-bottom: 36px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #d4850a, #f0c060);
      color: #1a1a2e;
      border: none;
      padding: 14px 32px;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0;
      color: rgba(255,255,255,0.15);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }

    .whatsapp-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(37,211,102,0.1);
      border: 1px solid rgba(37,211,102,0.2);
      color: #25d366;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s;
    }
    .whatsapp-btn:hover { background: rgba(37,211,102,0.18); }

    .status {
      margin-top: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.25);
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ef4444;
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  </style>
</head>
<body>
  <div class="bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="container">
    <div class="icon-wrap">🛵</div>
    <div class="brand">Travel Engineers</div>
    <h1>You're offline</h1>
    <p>Looks like you've lost your connection. Check your internet and try again — we'll get you back on the road!</p>

    <button class="btn" onclick="tryReload()">
      ↻ Try Again
    </button>

    <div class="divider">or reach us directly</div>

    <a class="whatsapp-btn" href="https://wa.me/" id="wa-link" target="_blank" rel="noreferrer">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      WhatsApp Us
    </a>

    <div class="status">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">No internet connection</span>
    </div>
  </div>

  <script>
    // Auto-reload when back online
    window.addEventListener('online', () => {
      document.getElementById('status-dot').style.background = '#22c55e';
      document.getElementById('status-text').textContent = 'Connection restored — reloading…';
      setTimeout(() => window.location.reload(), 1000);
    });

    function tryReload() {
      if (navigator.onLine) { window.location.href = '/'; }
      else {
        const btn = document.querySelector('.btn');
        btn.textContent = '✗ Still offline';
        setTimeout(() => { btn.innerHTML = '↻ Try Again'; }, 2000);
      }
    }

    // Load WhatsApp number from cache if possible
    if ('caches' in window) {
      caches.match('/api/agency').then(r => r?.json()).then(agency => {
        if (agency?.whatsapp) {
          document.getElementById('wa-link').href = `https://wa.me/${agency.whatsapp}`;
        }
      }).catch(() => {});
    }
  </script>
</body>
</html>
